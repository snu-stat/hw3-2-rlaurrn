name: Quarto Publish (R & Custom Packages)
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --only-upgrade -y libexpat1

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: r-reticulate
          channels: conda-forge,defaults

      - name: Fix expat version
        run: |
          conda install -y -n r-reticulate -c conda-forge pip expat=2.6
        shell: bash -l {0}

      - name: Install Python dependencies via Conda
        run: |
          conda install -y -n r-reticulate -c conda-forge \
            python=3.10 \
            numpy matplotlib polars plotnine statsmodels
        shell: bash -l {0}

      - name: Install Python dependencies via pip
        run: |
          conda run -n r-reticulate python -m pip install pylahman 
        shell: bash -l {0}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true 

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        timeout-minutes: 60
      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c("reticulate", "knitr", "rmarkdown", "ggplot2", "dplyr", "Lahman", "forcats", "tidyverse", "macleish", "lubridate", "scales", "googlesheets4", "rvest", "purr", "NHANES", "patchwork","mosaicData"))
        # 추가로 필요한 패키지 설치
        shell: Rscript {0}

      - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        run: |
          export RETICULATE_PYTHON=$(conda info --base)/envs/r-reticulate/bin/python
          quarto render
          quarto render hw03.qmd --to ipynb
        shell: bash -l {0}

      - name: Prepare Binder files
        run: |
          cp _site/hw03.ipynb hw03.ipynb
          cp Dockerfile _site/Dockerfile

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        timeout-minutes: 60
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

# ... (기존 Quarto Render 단계 이후)

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest